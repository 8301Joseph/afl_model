<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prooty</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f5;
      --surface: #fff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --r: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    header {
      background: #18181b;
      color: #fff;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    header .sub { font-size: 0.78rem; color: #a1a1aa; }
    header .ts { font-size: 0.72rem; color: #52525b; margin-left: auto; }
    header .tips { font-size: 0.72rem; color: #a1a1aa; }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.1rem 1rem;
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 1.1rem;
      align-items: start;
    }

    @media (max-width: 640px) {
      .wrap { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.25rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
      margin-bottom: 0.8rem;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.76rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: all 0.1s;
      user-select: none;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }
    .tab.past-tab { color: #a1a1aa; }
    .tab.past-tab:hover { border-color: var(--muted); color: var(--muted); }
    .tab.past-tab.active { background: var(--muted); border-color: var(--muted); color: #fff; }
    .tab.future-tab { color: #d4d4d8; border-color: #f0f0f1; cursor: not-allowed; }
    .tab.future-tab:hover { border-color: #f0f0f1; color: #d4d4d8; }

    /* Games grid */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 0.6rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 0.75rem 0.875rem;
    }
    .card.done { background: #fafafa; }

    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.55rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .matchup {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
    }

    .team { display: flex; flex-direction: column; gap: 0.1rem; }
    .team.away { align-items: flex-end; text-align: right; }

    .t-name { font-size: 0.82rem; font-weight: 600; line-height: 1.25; }
    .t-name.tip  { color: var(--accent); }
    .t-name.win  { color: var(--green); }
    .t-name.loss { color: var(--red); }
    .t-elo { font-size: 0.65rem; color: var(--muted); }

    .prob-col { display: flex; flex-direction: column; gap: 0.2rem; align-items: stretch; }

    .bar {
      height: 4px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
      display: flex;
    }
    .bar-h { height: 100%; background: var(--accent); }
    .bar-a { height: 100%; background: #cbd5e1; flex: 1; }

    .prob-nums {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .card-result {
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .card-result strong { color: var(--text); }
    .ok { color: var(--green); font-weight: 700; }
    .no { color: var(--red); font-weight: 700; }

    /* Sidebar */
    .sidebar { position: sticky; top: 1rem; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .panel-head {
      padding: 0.45rem 0.7rem;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .panel-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.4rem;
      font-size: 0.62rem;
      color: var(--muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.1s;
    }
    .panel-btn:hover { border-color: var(--accent); color: var(--accent); }

    .lt { width: 100%; border-collapse: collapse; font-size: 0.72rem; }

    .lt th {
      padding: 0.28rem 0.5rem;
      text-align: right;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.65rem;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .lt th:nth-child(2) { text-align: left; }

    .lt td {
      padding: 0.32rem 0.5rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .lt td:first-child { color: var(--muted); font-size: 0.65rem; width: 20px; }
    .lt td:nth-child(2) { text-align: left; font-weight: 500; font-size: 0.7rem; }
    .lt tr:last-child td { border-bottom: none; }
    .lt .divrow td { padding: 1px; background: var(--border); }

    /* Ratings modal */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: var(--r);
      width: 100%;
      max-width: 480px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0,0,0,0.18);
    }

    .modal-head {
      padding: 0.75rem 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .modal-head h3 { font-size: 0.875rem; font-weight: 600; }

    .modal-close {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 0.1rem 0.3rem;
    }
    .modal-close:hover { color: var(--text); }

    .rt { width: 100%; border-collapse: collapse; font-size: 0.78rem; }
    .rt th {
      padding: 0.35rem 1rem;
      text-align: right;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.68rem;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
      cursor: pointer;
      user-select: none;
      white-space: nowrap;
    }
    .rt th:first-child { text-align: left; }
    .rt th:hover { color: var(--accent); }
    .rt th.sort-active { color: var(--accent); }
    .rt th .tri { font-size: 0.55rem; margin-left: 0.2rem; opacity: 0.4; }
    .rt th.sort-active .tri { opacity: 1; }
    .rt td {
      padding: 0.38rem 1rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .rt td:first-child { text-align: left; font-weight: 500; }
    .rt tr:last-child td { border-bottom: none; }

    .empty { color: var(--muted); font-style: italic; padding: 0.875rem; font-size: 0.8rem; }
    #err { color: var(--red); padding: 1.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Prooty</h1>
    <span class="sub">AFL 2026 Predictions</span>
    <span class="tips" id="tips"></span>
    <span class="ts" id="ts"></span>
  </header>

  <div class="wrap">
    <main>
      <div id="tabs" class="tabs"></div>
      <div id="games" class="games"></div>
      <div id="err"></div>
    </main>

    <aside class="sidebar">
      <div class="panel">
        <div class="panel-head">
          Projected Ladder
          <button class="panel-btn" onclick="openRatings()">Team Ratings</button>
        </div>
        <div id="ladder"></div>
      </div>
    </aside>
  </div>

  <!-- Ratings modal -->
  <div class="overlay" id="overlay" onclick="closeOnBg(event)">
    <div class="modal">
      <div class="modal-head">
        <h3>Team Ratings</h3>
        <button class="modal-close" onclick="closeRatings()">✕</button>
      </div>
      <div style="overflow-y:auto; max-height:60vh;">
        <table class="rt">
          <thead><tr id="ratings-head">
            <th onclick="sortRatings('team')" data-key="team">Team <span class="tri">▲</span></th>
            <th onclick="sortRatings('elo')"  data-key="elo"  class="sort-active">Elo <span class="tri">▼</span></th>
            <th onclick="sortRatings('off')"  data-key="off">Off <span class="tri">▲</span></th>
            <th onclick="sortRatings('def')"  data-key="def">Def <span class="tri">▲</span></th>
          </tr></thead>
          <tbody id="ratings-body"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script>
    let all = [];
    let active = null;
    let ratingsData = [];
    let sortKey = 'elo';
    let sortAsc = false; // elo default: descending

    async function init() {
      try {
        const [pr, lr, rr, rtr] = await Promise.all([
          fetch('/predictions'), fetch('/ladder'), fetch('/results'), fetch('/ratings')
        ]);
        const pd  = await pr.json();
        const ld  = await lr.json();
        const rd  = await rr.json();
        const rtd = await rtr.json();

        const future = (pd.predictions || []).map(g => ({ ...g, type: 'future' }));
        const past   = (rd.results    || []).map(g => ({ ...g, type: 'past' }));
        all = [...past, ...future];
        ratingsData = rtd.ratings || [];

        if (pd.generated_at) {
          document.getElementById('ts').textContent = 'Updated ' + ago(pd.generated_at);
        }

        const pastList = rd.results || [];
        if (pastList.length) {
          const correct = pastList.filter(g => g.correct).length;
          document.getElementById('tips').textContent = `${correct}/${pastList.length} tips`;
        }

        const pastRounds   = [...new Set(past.map(g => g.round))].sort((a, b) => +a - +b);
        const futureRounds = [...new Set(future.map(g => g.round))].sort((a, b) => +a - +b);
        const allRounds    = [...new Set(all.map(g => g.round))].sort((a, b) => +a - +b);

        if (allRounds.length) {
          active = futureRounds.length ? futureRounds[0] : allRounds[allRounds.length - 1];
          renderTabs(allRounds, new Set(pastRounds));
          renderGames(all.filter(g => g.round === active));
        } else {
          document.getElementById('games').innerHTML = '<p class="empty">No games.</p>';
        }

        renderLadder(ld.ladder || []);
      } catch (e) {
        document.getElementById('err').textContent = 'Error: ' + e.message;
      }
    }

    function renderTabs(allRounds, pastSet) {
      // Only show past rounds + the current active round (future rounds are not navigable)
      const visibleRounds = allRounds.filter(r => pastSet.has(r) || r === active);
      document.getElementById('tabs').innerHTML = visibleRounds.map(r => {
        const isPast = pastSet.has(r);
        const cls = ['tab', isPast ? 'past-tab' : '', r === active ? 'active' : ''].filter(Boolean).join(' ');
        return `<button class="${cls}" onclick="pick('${r}', this)">Rd ${r}</button>`;
      }).join('');
    }

    function pick(r, el) {
      active = r;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGames(all.filter(g => g.round === r));
    }

    function renderGames(games) {
      const el = document.getElementById('games');
      if (!games.length) { el.innerHTML = '<p class="empty">No games.</p>'; return; }

      el.innerHTML = [...games].sort((a, b) => new Date(a.date) - new Date(b.date)).map(g => {
        const hp   = Math.round(g.win_prob_home * 100);
        const ap   = 100 - hp;
        const isPast = g.type === 'past';
        const homeWon = isPast && g.actual_winner === g.home_team;
        const awayWon = isPast && g.actual_winner === g.away_team;
        const homeTipped = g.predicted_winner === g.home_team;

        // Colour logic for past games: green = actual winner, red = wrong tip
        const homeCls = isPast
          ? (homeWon ? ' win' : (homeTipped ? ' loss' : ''))
          : (homeTipped ? ' tip' : '');
        const awayCls = isPast
          ? (awayWon ? ' win' : (!homeTipped ? ' loss' : ''))
          : (!homeTipped ? ' tip' : '');

        const predMargin = Math.abs(Math.round(g.predicted_margin));
        const actualMarginStr = (g.actual_margin > 0 ? '+' : '') + g.actual_margin;
        const result = isPast
          ? `<div class="card-result">
               <span>Tipped: <strong>${g.predicted_winner}</strong> by ${predMargin} (${hp}%)</span>
               <span class="${g.correct ? 'ok' : 'no'}">${g.correct ? '✓' : '✗'}&nbsp;${actualMarginStr} &middot; ${g.home_score}–${g.away_score}</span>
             </div>`
          : `<div class="card-result"><strong>${g.predicted_winner}</strong> by ${Math.abs(g.predicted_margin)} pts</div>`;

        return `<div class="card${isPast ? ' done' : ''}">
          <div class="card-meta">${fdate(g.date)}${g.location ? ' &middot; ' + g.location : ''}</div>
          <div class="matchup">
            <div class="team home">
              <span class="t-name${homeCls}">${g.home_team}</span>
              ${isPast ? '' : `<span class="t-elo">Elo ${g.home_elo}</span>`}
            </div>
            <div class="prob-col">
              <div class="bar"><div class="bar-h" style="width:${hp}%"></div><div class="bar-a"></div></div>
              <div class="prob-nums"><span>${hp}%</span><span>${ap}%</span></div>
            </div>
            <div class="team away">
              <span class="t-name${awayCls}">${g.away_team}</span>
              ${isPast ? '' : `<span class="t-elo">Elo ${g.away_elo}</span>`}
            </div>
          </div>
          ${result}
        </div>`;
      }).join('');
    }

    function renderLadder(ladder) {
      const el = document.getElementById('ladder');
      if (!ladder.length) { el.innerHTML = '<p class="empty">Unavailable.</p>'; return; }
      const rows = ladder.map(t =>
        (t.position === 9 ? '<tr class="divrow"><td colspan="4"></td></tr>' : '') +
        `<tr><td>${t.position}</td><td>${t.team}</td><td>${t.wins}</td><td>${t.pct}%</td></tr>`
      ).join('');
      el.innerHTML = `<table class="lt">
        <thead><tr><th>#</th><th>Team</th><th>xW</th><th>%</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>`;
    }

    function openRatings() {
      sortRatingsTable(); // renders body + syncs header triangles
      document.getElementById('overlay').classList.add('open');
    }

    function closeRatings() {
      document.getElementById('overlay').classList.remove('open');
    }

    function closeOnBg(e) {
      if (e.target === document.getElementById('overlay')) closeRatings();
    }

    function sortRatings(key) {
      if (sortKey === key) {
        sortAsc = !sortAsc;
      } else {
        sortKey = key;
        // Sensible defaults: team A→Z, def lower-is-better ascending, others descending
        sortAsc = (key === 'team' || key === 'def');
      }
      sortRatingsTable();
    }

    function sortRatingsTable() {
      const sorted = [...ratingsData].sort((a, b) => {
        let cmp;
        if (sortKey === 'team') cmp = a.team.localeCompare(b.team);
        else cmp = a[sortKey] - b[sortKey];
        return sortAsc ? cmp : -cmp;
      });

      // Update header indicators
      document.querySelectorAll('#ratings-head th').forEach(th => {
        const key = th.dataset.key;
        th.classList.toggle('sort-active', key === sortKey);
        th.querySelector('.tri').textContent = key === sortKey
          ? (sortAsc ? '▲' : '▼')
          : '▲';
      });

      document.getElementById('ratings-body').innerHTML = sorted.map(t =>
        `<tr>
          <td>${t.team}</td>
          <td>${t.elo}</td>
          <td>${t.off}</td>
          <td>${t.def}</td>
        </tr>`
      ).join('');
    }

    function fdate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function ago(iso) {
      const h = Math.floor((Date.now() - new Date(iso)) / 3600000);
      if (h < 1) return 'just now';
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    init();
  </script>
</body>
</html>
