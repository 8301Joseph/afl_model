<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prooty</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f4f5;
      --surface: #fff;
      --border: #e4e4e7;
      --text: #18181b;
      --muted: #71717a;
      --accent: #2563eb;
      --green: #16a34a;
      --red: #dc2626;
      --r: 8px;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }

    header {
      background: #18181b;
      color: #fff;
      padding: 0.75rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.2rem; font-weight: 700; letter-spacing: -0.3px; }
    header .sub { font-size: 0.78rem; color: #a1a1aa; }
    header .ts { font-size: 0.72rem; color: #52525b; margin-left: auto; }

    .wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.1rem 1rem;
      display: grid;
      grid-template-columns: 1fr 210px;
      gap: 1.1rem;
      align-items: start;
    }

    @media (max-width: 640px) {
      .wrap { grid-template-columns: 1fr; }
      .sidebar { order: -1; }
    }

    /* Tabs */
    .tabs {
      display: flex;
      gap: 0.25rem;
      overflow-x: auto;
      padding-bottom: 0.4rem;
      margin-bottom: 0.8rem;
      scrollbar-width: none;
    }
    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 0.28rem 0.7rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--muted);
      font-size: 0.76rem;
      cursor: pointer;
      white-space: nowrap;
      font-family: inherit;
      transition: all 0.1s;
      user-select: none;
    }
    .tab:hover { border-color: var(--accent); color: var(--accent); }
    .tab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Games grid — 2 per row */
    .games {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(255px, 1fr));
      gap: 0.6rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 0.75rem 0.875rem;
    }

    .card-meta {
      font-size: 0.68rem;
      color: var(--muted);
      margin-bottom: 0.55rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 3-col matchup layout */
    .matchup {
      display: grid;
      grid-template-columns: 1fr 1.4fr 1fr;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
    }

    .team { display: flex; flex-direction: column; gap: 0.1rem; }
    .team.away { align-items: flex-end; text-align: right; }

    .t-name { font-size: 0.82rem; font-weight: 600; line-height: 1.25; }
    .t-name.w { color: var(--accent); }
    .t-elo { font-size: 0.65rem; color: var(--muted); }

    .prob-col { display: flex; flex-direction: column; gap: 0.2rem; align-items: stretch; }

    .bar {
      height: 4px;
      border-radius: 999px;
      background: var(--border);
      overflow: hidden;
      display: flex;
    }
    .bar-h { height: 100%; background: var(--accent); }
    .bar-a { height: 100%; background: #cbd5e1; flex: 1; }

    .prob-nums {
      display: flex;
      justify-content: space-between;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .card-result {
      font-size: 0.72rem;
      color: var(--muted);
      padding-top: 0.35rem;
      border-top: 1px solid var(--border);
    }
    .card-result strong { color: var(--text); }

    /* Sidebar */
    .sidebar { position: sticky; top: 1rem; }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow: hidden;
    }

    .panel-head {
      padding: 0.45rem 0.7rem;
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }

    .lt { width: 100%; border-collapse: collapse; font-size: 0.72rem; }

    .lt th {
      padding: 0.28rem 0.5rem;
      text-align: right;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.65rem;
      border-bottom: 1px solid var(--border);
      background: #fafafa;
    }
    .lt th:nth-child(2) { text-align: left; }

    .lt td {
      padding: 0.32rem 0.5rem;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .lt td:first-child { color: var(--muted); font-size: 0.65rem; width: 20px; }
    .lt td:nth-child(2) { text-align: left; font-weight: 500; font-size: 0.7rem; }
    .lt tr:last-child td { border-bottom: none; }
    .lt .divrow td { padding: 1px; background: var(--border); }

    /* Past results */
    .past { margin-top: 1.1rem; }

    .sec-head {
      display: flex;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 0.55rem;
    }
    .sec-head h2 { font-size: 0.875rem; font-weight: 600; }

    .badge {
      font-size: 0.66rem;
      padding: 0.15rem 0.45rem;
      border-radius: 999px;
      background: #eff6ff;
      color: var(--accent);
      font-weight: 500;
    }

    .tbl-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      overflow-x: auto;
    }

    .rt { width: 100%; border-collapse: collapse; font-size: 0.73rem; }

    .rt th {
      padding: 0.4rem 0.65rem;
      text-align: left;
      font-weight: 500;
      color: var(--muted);
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.3px;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      background: #fafafa;
    }

    .rt td {
      padding: 0.42rem 0.65rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }
    .rt tr:last-child td { border-bottom: none; }
    .rt tr:hover td { background: #fafafa; }

    .ok { color: var(--green); font-weight: 700; }
    .no { color: var(--red); font-weight: 700; }
    .empty { color: var(--muted); font-style: italic; padding: 0.875rem; font-size: 0.8rem; }
    #err { color: var(--red); padding: 1.5rem; }
  </style>
</head>
<body>
  <header>
    <h1>Prooty</h1>
    <span class="sub">AFL 2026 Predictions</span>
    <span class="ts" id="ts"></span>
  </header>

  <div class="wrap">
    <main>
      <div id="tabs" class="tabs"></div>
      <div id="games" class="games"></div>
      <div id="past" class="past"></div>
      <div id="err"></div>
    </main>

    <aside class="sidebar">
      <div id="ladder" class="panel"></div>
    </aside>
  </div>

  <script>
    let all = [];
    let active = null;

    async function init() {
      try {
        const [pr, lr, rr] = await Promise.all([
          fetch('/predictions'), fetch('/ladder'), fetch('/results')
        ]);
        const pd = await pr.json();
        const ld = await lr.json();
        const rd = await rr.json();

        all = pd.predictions || [];

        if (pd.generated_at) {
          document.getElementById('ts').textContent = 'Updated ' + ago(pd.generated_at);
        }

        const rounds = [...new Set(all.map(g => g.round))].sort((a, b) => +a - +b);

        if (rounds.length) {
          active = rounds[0];
          renderTabs(rounds);
          renderGames(all.filter(g => g.round === active));
        } else {
          document.getElementById('games').innerHTML = '<p class="empty">No upcoming games.</p>';
        }

        renderLadder(ld.ladder || []);
        renderPast(rd.results || []);
      } catch (e) {
        document.getElementById('err').textContent = 'Error loading data: ' + e.message;
      }
    }

    function renderTabs(rounds) {
      document.getElementById('tabs').innerHTML = rounds.map(r =>
        `<button class="tab${r === active ? ' active' : ''}" onclick="pick(${JSON.stringify(r)}, this)">Rd ${r}</button>`
      ).join('');
    }

    function pick(r, el) {
      active = r;
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      renderGames(all.filter(g => g.round === r));
    }

    function renderGames(games) {
      const el = document.getElementById('games');
      if (!games.length) { el.innerHTML = '<p class="empty">No games.</p>'; return; }
      el.innerHTML = games.map(g => {
        const hp = Math.round(g.win_prob_home * 100);
        const ap = 100 - hp;
        const hw = g.predicted_winner === g.home_team;
        return `<div class="card">
          <div class="card-meta">${fdate(g.date)}${g.location ? ' &middot; ' + g.location : ''}</div>
          <div class="matchup">
            <div class="team home">
              <span class="t-name${hw ? ' w' : ''}">${g.home_team}</span>
              <span class="t-elo">Elo ${g.home_elo}</span>
            </div>
            <div class="prob-col">
              <div class="bar"><div class="bar-h" style="width:${hp}%"></div><div class="bar-a"></div></div>
              <div class="prob-nums"><span>${hp}%</span><span>${ap}%</span></div>
            </div>
            <div class="team away">
              <span class="t-name${!hw ? ' w' : ''}">${g.away_team}</span>
              <span class="t-elo">Elo ${g.away_elo}</span>
            </div>
          </div>
          <div class="card-result"><strong>${g.predicted_winner}</strong> by ${Math.abs(g.predicted_margin)} pts</div>
        </div>`;
      }).join('');
    }

    function renderLadder(ladder) {
      const el = document.getElementById('ladder');
      if (!ladder.length) { el.innerHTML = '<p class="empty">Unavailable.</p>'; return; }
      const rows = ladder.map(t =>
        (t.position === 9 ? '<tr class="divrow"><td colspan="5"></td></tr>' : '') +
        `<tr>
          <td>${t.position}</td>
          <td>${t.team}</td>
          <td>${t.played}</td>
          <td>${t.pts}</td>
          <td>${t.pct}%</td>
        </tr>`
      ).join('');
      el.innerHTML = `
        <div class="panel-head">Projected Ladder</div>
        <table class="lt">
          <thead><tr><th>#</th><th>Team</th><th>P</th><th>Pts</th><th>%</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>`;
    }

    function renderPast(results) {
      const el = document.getElementById('past');
      if (!results.length) {
        el.innerHTML = `<div class="sec-head"><h2>Past Results</h2></div>
          <div class="tbl-wrap"><p class="empty">No past games yet this season.</p></div>`;
        return;
      }
      const correct = results.filter(r => r.correct).length;
      const pct = Math.round(correct / results.length * 100);
      const rows = results.map(r => `
        <tr>
          <td>Rd ${r.round}</td>
          <td>${fdate(r.date)}</td>
          <td style="font-weight:500">${r.home_team}</td>
          <td>${r.home_score}–${r.away_score}</td>
          <td style="font-weight:500">${r.away_team}</td>
          <td>${r.predicted_winner}</td>
          <td>${Math.round(r.win_prob_home * 100)}%</td>
          <td>${r.correct ? '<span class="ok">✓</span>' : '<span class="no">✗</span>'}</td>
        </tr>`).join('');
      el.innerHTML = `
        <div class="sec-head">
          <h2>Past Results</h2>
          <span class="badge">${correct}/${results.length} correct (${pct}%)</span>
        </div>
        <div class="tbl-wrap">
          <table class="rt">
            <thead><tr><th>Rd</th><th>Date</th><th>Home</th><th>Score</th><th>Away</th><th>Predicted</th><th>Prob</th><th></th></tr></thead>
            <tbody>${rows}</tbody>
          </table>
        </div>`;
    }

    function fdate(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleDateString('en-AU', { weekday: 'short', day: 'numeric', month: 'short' });
    }

    function ago(iso) {
      const h = Math.floor((Date.now() - new Date(iso)) / 3600000);
      if (h < 1) return 'just now';
      if (h < 24) return h + 'h ago';
      return Math.floor(h / 24) + 'd ago';
    }

    init();
  </script>
</body>
</html>
